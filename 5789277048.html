
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ihih - 3D Menu</title>

    <script
        type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #aaa;
            font-size: 14px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .food-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .food-card:hover {
            transform: scale(1.03);
        }

        .food-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .food-info {
            padding: 12px;
        }

        .food-info h3 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 13px;
        }

        .food-info button {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            color: white;
            text-align: center;
            padding: 15px;
        }

        .modal-header h2 {
            font-size: 22px;
        }

        .modal-header p {
            color: #e74c3c;
            font-size: 18px;
            margin-top: 5px;
        }

        model-viewer {
            width: 90vw;
            height: 60vh;
            max-width: 500px;
        }

        .close-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .hint {
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
        }

    </style>
</head>

<body>

    <div class="header">
        <h1>🍽️ Ihih</h1>

        <p>Tap any dish to see it in 3D!</p>
    </div>

    <div class="menu-grid">
        
        <div class="food-card" onclick="showModel(0)">
            <img src="https://api.telegram.org/file/bot8282514486:AAH5OigcWF9C6_pkpuByU9hZU8BFsOjUlvY/photos/file_5.jpg" alt="Gu ghv">

            <div class="food-info">
                <h3>Gu ghv</h3>

                <p class="price">454</p>

                <button>👁️ View in 3D</button>
            </div>
        </div>
        
    </div>

    <div class="modal" id="modal">

        <div class="modal-header">
            <h2 id="modelTitle"></h2>

            <p id="modelPrice"></p>
        </div>

          <model-viewer
    id="modelViewer"
    src=""
    auto-rotate
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-button
    shadow-intensity="1"
    exposure="1.2">
</model-viewer>

        <p class="hint">
            👆 Drag to rotate • Pinch to zoom
        </p>

        <button class="close-btn" onclick="closeModal()">
            ✕ Close
        </button>

    </div>

    <script>

        const modal = document.getElementById('modal');
        const viewer = document.getElementById('modelViewer');
        const title = document.getElementById('modelTitle');
        const price = document.getElementById('modelPrice');

        function showModel(index) {

            modal.classList.add('active');

            
        if(index === 0) {
            viewer.src = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb";
            title.textContent = "Gu ghv";
            price.textContent = "454";
        }
        
        }

        function closeModal() {

            modal.classList.remove('active');
            viewer.src = '';
        }

        modal.addEventListener('click', function(e) {

            if(e.target === modal) {
                closeModal();
            }

        });

    </script>

</body>
</html>
